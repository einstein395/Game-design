<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Tic Tac Toe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #05050f;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 0, 100, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(120, 0, 255, 0.04) 0%, transparent 60%);
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            color: #e0e0e0;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            font-weight: 900;
            color: #ff0066;
            text-shadow:
                0 0 10px #ff0066,
                0 0 30px rgba(255, 0, 102, 0.5),
                0 0 60px rgba(255, 0, 102, 0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ── SETUP SCREEN ── */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .setup-label {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #0cf;
            text-shadow: 0 0 8px rgba(0,200,255,0.4);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .player-setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .player-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #e0e0e0;
        }

        .symbol-choice {
            display: flex;
            gap: 16px;
        }

        .symbol-btn {
            width: 70px;
            height: 70px;
            font-size: 1.8rem;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            border: 2px solid #333355;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: #555577;
            letter-spacing: 0;
        }

        .symbol-btn:hover {
            border-color: #0cf;
            color: #0cf;
            text-shadow: 0 0 12px rgba(0,200,255,0.7);
            box-shadow: 0 0 15px rgba(0,200,255,0.3);
        }

        .symbol-btn.selected-x {
            border-color: #ff0066;
            color: #ff0066;
            text-shadow: 0 0 12px rgba(255,0,102,0.7);
            box-shadow: 0 0 15px rgba(255,0,102,0.3);
            background: rgba(255,0,102,0.05);
        }

        .symbol-btn.selected-o {
            border-color: #0cf;
            color: #0cf;
            text-shadow: 0 0 12px rgba(0,200,255,0.7);
            box-shadow: 0 0 15px rgba(0,200,255,0.3);
            background: rgba(0,200,255,0.05);
        }

        .symbol-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .start-btn {
            padding: 14px 40px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: #ff0066;
            border: 2px solid #ff0066;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(255,0,102,0.5);
            box-shadow: 0 0 10px rgba(255,0,102,0.2);
            opacity: 0.3;
            pointer-events: none;
        }

        .start-btn.ready {
            opacity: 1;
            pointer-events: auto;
        }

        .start-btn.ready:hover {
            background: rgba(255,0,102,0.1);
            box-shadow: 0 0 25px rgba(255,0,102,0.4);
        }

        /* ── GAME SCREEN ── */
        #game {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 24px;
            border: 1px solid #1a1a30;
            border-radius: 6px;
            background: #0a0a1a;
            transition: all 0.3s;
            min-width: 110px;
        }

        .player-card.active {
            border-color: #0cf;
            box-shadow: 0 0 15px rgba(0,200,255,0.25), inset 0 0 10px rgba(0,200,255,0.05);
        }

        .player-card.active.x-active {
            border-color: #ff0066;
            box-shadow: 0 0 15px rgba(255,0,102,0.25), inset 0 0 10px rgba(255,0,102,0.05);
        }

        .card-label {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #555577;
            text-transform: uppercase;
        }

        .card-symbol {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
        }

        .card-symbol.x { color: #ff0066; text-shadow: 0 0 10px rgba(255,0,102,0.6); }
        .card-symbol.o { color: #0cf; text-shadow: 0 0 10px rgba(0,200,255,0.6); }

        .card-chances {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: #555577;
            text-transform: uppercase;
        }

        .chance-pips {
            display: flex;
            gap: 5px;
        }

        .pip {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #222240;
            border: 1px solid #333355;
            transition: all 0.3s;
        }

        .pip.used-x { background: #ff0066; border-color: #ff0066; box-shadow: 0 0 5px rgba(255,0,102,0.5); }
        .pip.used-o { background: #0cf; border-color: #0cf; box-shadow: 0 0 5px rgba(0,200,255,0.5); }

        .vs-divider {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #333355;
        }

        /* Board */
        .board-wrap {
            padding: 6px;
            background: #0a0a1a;
            border: 2px solid #0cf;
            border-radius: 4px;
            box-shadow:
                0 0 15px rgba(0,200,255,0.3),
                0 0 40px rgba(0,200,255,0.1),
                inset 0 0 15px rgba(0,200,255,0.1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 110px);
            grid-template-rows: repeat(3, 110px);
            gap: 4px;
            background: #0a0a1a;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 900;
            cursor: pointer;
            background: #0e0e1c;
            border: 1px solid #1a1a30;
            border-radius: 3px;
            transition: all 0.15s;
            position: relative;
            user-select: none;
        }

        .cell:hover:not(.taken) {
            background: #12122a;
            border-color: #2a2a50;
            box-shadow: inset 0 0 15px rgba(120,0,255,0.1);
        }

        .cell.taken { cursor: default; }

        .cell .mark {
            position: relative;
            z-index: 1;
            animation: markAppear 0.25s cubic-bezier(0.17,0.67,0.35,1.2) forwards;
        }

        .cell .mark.x {
            color: #ff0066;
            text-shadow: 0 0 12px rgba(255,0,102,0.7), 0 0 30px rgba(255,0,102,0.3);
        }

        .cell .mark.o {
            color: #0cf;
            text-shadow: 0 0 12px rgba(0,200,255,0.7), 0 0 30px rgba(0,200,255,0.3);
        }

        @keyframes markAppear {
            0%  { transform: scale(0) rotate(-20deg); opacity: 0; }
            70% { transform: scale(1.15) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .cell.win-cell {
            animation: winFlash 0.5s ease-in-out infinite alternate;
        }

        @keyframes winFlash {
            from { background: #0e0e1c; }
            to   { background: #150515; box-shadow: inset 0 0 20px rgba(255,0,102,0.15); }
        }

        /* Status */
        #status {
            font-size: 1rem;
            letter-spacing: 2px;
            min-height: 1.5rem;
            color: #0cf;
            text-shadow: 0 0 8px rgba(0,200,255,0.4);
            text-transform: uppercase;
            text-align: center;
        }

        #status.win  { color: #ff0066; text-shadow: 0 0 10px rgba(255,0,102,0.6); }
        #status.draw { color: #7800ff; text-shadow: 0 0 10px rgba(120,0,255,0.6); }

        /* Buttons */
        .action-btn {
            padding: 12px 32px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: #0cf;
            border: 2px solid #0cf;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(0,200,255,0.5);
            box-shadow: 0 0 10px rgba(0,200,255,0.2);
        }

        .action-btn:hover {
            background: rgba(0,200,255,0.1);
            box-shadow: 0 0 20px rgba(0,200,255,0.4);
        }

        .action-btn.hidden { display: none; }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup">
        <h1>Tic Tac Toe</h1>
        <p style="font-size:0.7rem;letter-spacing:3px;color:#555577;text-transform:uppercase;">Choose your symbols</p>

        <div style="display:flex;gap:50px;align-items:flex-start;">
            <!-- Player 1 -->
            <div class="player-setup">
                <div class="player-name">Player 1</div>
                <div class="setup-label">Pick your symbol</div>
                <div class="symbol-choice">
                    <button class="symbol-btn" id="p1x" onclick="pick(1,'X')">X</button>
                    <button class="symbol-btn" id="p1o" onclick="pick(1,'O')">O</button>
                </div>
            </div>

            <!-- Player 2 -->
            <div class="player-setup">
                <div class="player-name">Player 2</div>
                <div class="setup-label">Pick your symbol</div>
                <div class="symbol-choice">
                    <button class="symbol-btn" id="p2x" onclick="pick(2,'X')">X</button>
                    <button class="symbol-btn" id="p2o" onclick="pick(2,'O')">O</button>
                </div>
            </div>
        </div>

        <button class="start-btn" id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game">
        <h1>Tic Tac Toe</h1>

        <div class="scoreboard">
            <div class="player-card active" id="card1">
                <div class="card-label">Player 1</div>
                <div class="card-symbol" id="sym1">X</div>
                <div class="chance-pips" id="pips1">
                    <div class="pip" id="pip1-0"></div>
                    <div class="pip" id="pip1-1"></div>
                    <div class="pip" id="pip1-2"></div>
                </div>
                <div class="card-chances">Chances left</div>
            </div>

            <div class="vs-divider">VS</div>

            <div class="player-card" id="card2">
                <div class="card-label">Player 2</div>
                <div class="card-symbol" id="sym2">O</div>
                <div class="chance-pips" id="pips2">
                    <div class="pip" id="pip2-0"></div>
                    <div class="pip" id="pip2-1"></div>
                    <div class="pip" id="pip2-2"></div>
                </div>
                <div class="card-chances">Chances left</div>
            </div>
        </div>

        <div class="board-wrap">
            <div class="board" id="board"></div>
        </div>

        <p id="status">Player 1's turn</p>

        <div style="display:flex;gap:14px;">
            <button class="action-btn hidden" id="playAgainBtn" onclick="playAgain()">Play Again</button>
            <button class="action-btn hidden" id="newGameBtn" onclick="newGame()">New Game</button>
        </div>
    </div>

<script>
    const WINS = [
        [0,1,2],[3,4,5],[6,7,8],   // rows
        [0,3,6],[1,4,7],[2,5,8],   // cols
        [0,4,8],[2,4,6]            // diagonals
    ];

    let p1Symbol = null, p2Symbol = null;
    let board = Array(9).fill(null);
    let currentPlayer = 1;         // 1 or 2
    let chances = [3, 3];          // [p1 remaining, p2 remaining]
    let gameOver = false;

    // ── Setup ──
    function pick(player, symbol) {
        const other = symbol === 'X' ? 'O' : 'X';

        if (player === 1) {
            p1Symbol = symbol;
            p2Symbol = other;

            // Update P1 buttons
            document.getElementById('p1x').className = 'symbol-btn' + (symbol === 'X' ? ' selected-x' : '');
            document.getElementById('p1o').className = 'symbol-btn' + (symbol === 'O' ? ' selected-o' : '');

            // Auto-assign P2 and lock their buttons
            document.getElementById('p2x').className = 'symbol-btn' + (other === 'X' ? ' selected-x' : '');
            document.getElementById('p2o').className = 'symbol-btn' + (other === 'O' ? ' selected-o' : '');
            document.getElementById('p2x').disabled = true;
            document.getElementById('p2o').disabled = true;
        } else {
            // P2 can only pick if P1 already picked
            if (!p1Symbol) return;
            if (symbol === p1Symbol) return; // already taken
        }

        updateStartBtn();
    }

    function updateStartBtn() {
        const btn = document.getElementById('startBtn');
        if (p1Symbol && p2Symbol) {
            btn.classList.add('ready');
        }
    }

    // ── Game start ──
    function startGame() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'flex';

        board = Array(9).fill(null);
        currentPlayer = 1;
        chances = [3, 3];
        gameOver = false;

        // Apply symbols to cards
        const sym1El = document.getElementById('sym1');
        sym1El.textContent = p1Symbol;
        sym1El.className = 'card-symbol ' + p1Symbol.toLowerCase();

        const sym2El = document.getElementById('sym2');
        sym2El.textContent = p2Symbol;
        sym2El.className = 'card-symbol ' + p2Symbol.toLowerCase();

        renderPips();
        renderBoard();
        updateCards();
        setStatus("Player 1's turn");
    }

    // ── Board rendering ──
    function renderBoard() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell' + (board[i] ? ' taken' : '');
            cell.dataset.index = i;
            if (board[i]) {
                const mark = document.createElement('span');
                mark.className = 'mark ' + board[i].toLowerCase();
                mark.textContent = board[i];
                cell.appendChild(mark);
            }
            cell.addEventListener('click', () => handleClick(i));
            boardEl.appendChild(cell);
        }
    }

    function highlightWin(cells) {
        const boardEl = document.getElementById('board');
        cells.forEach(i => {
            boardEl.children[i].classList.add('win-cell');
        });
    }

    // ── Pips ──
    function renderPips() {
        for (let p = 1; p <= 2; p++) {
            const used = 3 - chances[p - 1];
            const sym = p === 1 ? p1Symbol : p2Symbol;
            for (let i = 0; i < 3; i++) {
                const pip = document.getElementById('pip' + p + '-' + i);
                pip.className = 'pip' + (i < used ? (' used-' + sym.toLowerCase()) : '');
            }
        }
    }

    // ── Card highlight ──
    function updateCards() {
        const c1 = document.getElementById('card1');
        const c2 = document.getElementById('card2');
        c1.className = 'player-card' + (currentPlayer === 1 ? (' active' + (p1Symbol === 'X' ? ' x-active' : '')) : '');
        c2.className = 'player-card' + (currentPlayer === 2 ? (' active' + (p2Symbol === 'X' ? ' x-active' : '')) : '');
    }

    // ── Status ──
    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = type || '';
    }

    // ── Move handler ──
    function handleClick(index) {
        if (gameOver) return;
        if (board[index]) return;

        const sym = currentPlayer === 1 ? p1Symbol : p2Symbol;
        const pIdx = currentPlayer - 1;

        if (chances[pIdx] <= 0) return;

        board[index] = sym;
        chances[pIdx]--;

        renderPips();
        renderBoard();

        // Check win
        const winLine = checkWin(sym);
        if (winLine) {
            gameOver = true;
            highlightWin(winLine);
            setStatus('Player ' + currentPlayer + ' wins!', 'win');
            showEndButtons();
            return;
        }

        // Check draw (both out of chances OR board full with no winner)
        if (chances[0] === 0 && chances[1] === 0) {
            gameOver = true;
            setStatus("It's a draw!", 'draw');
            showEndButtons();
            return;
        }

        // Switch player — skip if next player has no chances left
        const next = currentPlayer === 1 ? 2 : 1;
        if (chances[next - 1] === 0) {
            // Other player still has chances (shouldn't normally happen simultaneously)
            gameOver = true;
            setStatus("It's a draw!", 'draw');
            showEndButtons();
            return;
        }

        currentPlayer = next;
        updateCards();
        setStatus('Player ' + currentPlayer + "'s turn");
    }

    function checkWin(sym) {
        for (const line of WINS) {
            if (line.every(i => board[i] === sym)) return line;
        }
        return null;
    }

    function showEndButtons() {
        document.getElementById('playAgainBtn').classList.remove('hidden');
        document.getElementById('newGameBtn').classList.remove('hidden');
    }

    // ── Replay with same symbols ──
    function playAgain() {
        board = Array(9).fill(null);
        currentPlayer = 1;
        chances = [3, 3];
        gameOver = false;

        document.getElementById('playAgainBtn').classList.add('hidden');
        document.getElementById('newGameBtn').classList.add('hidden');

        renderPips();
        renderBoard();
        updateCards();
        setStatus("Player 1's turn");
    }

    // ── Back to setup ──
    function newGame() {
        p1Symbol = null;
        p2Symbol = null;

        // Reset setup buttons
        ['p1x','p1o','p2x','p2o'].forEach(id => {
            const btn = document.getElementById(id);
            btn.className = 'symbol-btn';
            btn.disabled = false;
        });
        document.getElementById('startBtn').classList.remove('ready');

        document.getElementById('playAgainBtn').classList.add('hidden');
        document.getElementById('newGameBtn').classList.add('hidden');

        document.getElementById('game').style.display = 'none';
        document.getElementById('setup').style.display = 'flex';
    }
</script>
</body>
</html>
